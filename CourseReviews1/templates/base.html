<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUC Course Reviews</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body, html {
            height: 100%;
        }
        .wrapper {
            min-height: 100%;
            display: flex;
            flex-direction: column;
        }
        main {
            flex: 1;
        }
        .navbar, .footer {
            background-color: #001F3F;
        }
        .nav-link {
            display: inline-block;
            margin-right: 9px; /* Add some spacing between the links if needed */
        }
        .welcome-container {
            max-width: 600px;
            margin: 5% auto;
            text-align: center;
            padding: 20px;
            background-color: #f9f9f9;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .lead-text {
            font-size: 1.5em;
            margin-bottom: 20px;
            color: #333;
        }

        .action-buttons .btn {
            margin: 0 10px;
            transition: transform 0.3s;
            border-radius: 0px;
        }

        .action-buttons .btn:hover {
            transform: scale(1.05);
        }

        .btn-primary {
            background-color: #001F3F; /* Navy blue color */
        }

        .login-container {
            max-width: 400px;
            margin: 5% auto;
            padding: 20px;
            background-color: #f9f9f9;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .login-form .form-group {
            margin-bottom: 15px;
        }

        .login-form input[type="text"],
        .login-form input[type="password"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        .btn-primary {
            width: 100%;
            padding: 10px;
            background-color: #001F3F;  /* Navy blue color */
            border: none;
            border-radius: 4px;
            transition: background-color 0.3s;
        }

        .btn-primary:hover {
            background-color: #003366;  /* A darker shade of the navy blue for hover effect */
        }

        .register-link {
            margin-top: 15px;
            text-align: center;
        }

        .register-link a {
            color: #1e914e; /* Navy blue color */
            text-decoration: none;
            font-weight: 20px;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        .register-container {
            max-width: 400px;
            margin: 0 auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background-color: #f9f9f9;
        }

        .register-form .form-group {
            margin-bottom: 15px;
        }

        .register-form label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .register-form input[type="text"], .register-form input[type="password"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .login-link {
            margin-top: 15px;
            text-align: center;
        }

        .login-link a {
            color: #001F3F; /* Navy blue color */
            text-decoration: none;
        }

        .login-link a:hover {
            text-decoration: underline;
        }



    
    </style>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="wrapper">

<header>
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
      <a class="navbar-brand" href="{% url 'reviews:course_list' %}">AUC Course Reviews</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ml-auto">
          {% if user.is_authenticated %}
          <li class="nav-item">
            <a class="nav-link" href="{% url 'reviews:course_list' %}">Courses</a>

            <a class="nav-link" href="{% url 'feedback:about' %}">About</a>

            <a class="nav-link" href="{% url 'feedback:feedback' %}">Feedback</a>

            <a class="nav-link" href="{% url 'users:login' %}">Logout</a>
          </li>
          {% else %}
          <li class="nav-item">
            <a class="nav-link" href="{% url 'users:login' %}">Login</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{% url 'users:register' %}">Register</a>
          </li>
          {% endif %}
        </ul>
      </div>
    </div>
  </nav>
</header>

<main class="container mt-5">
    {% block content %}{% endblock %}
</main>

<footer class="footer py-3 text-white">
    <div class="container">
      <p class="text-center mb-0">© 2023 Course Reviews. All rights reserved.</p>
    </div>
</footer>

</body>
</html>
